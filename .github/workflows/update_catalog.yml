name: Update Catalog for Bitly

on:
  workflow_dispatch:
  schedule:
  # On Fridays
  - cron: '0 12 * * 5'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  FORCE_COLOR: "1"
  # renovate: datasource=pypi depName=uv
  UV_VERSION: 0.11.25

jobs:
  update_openapi_specification:
    name: Update Catalog
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # Required by peter-evans/create-pull-request
      pull-requests: write  # Required by peter-evans/create-pull-request
    steps:
    - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: generate-token
      with:
        permission-contents: write
        client-id: ${{ vars.RESERVOIR_GITHUB_APP_ID }}
        private-key: ${{ secrets.RESERVOIR_GITHUB_APP_PKEY }} # zizmor: ignore[secrets-outside-env]
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
    - run: uv run scripts/update_openapi.py
    - id: check_snapshot_changes
      continue-on-error: true
      run: git diff --quiet tests/__snapshots__
    - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      if: steps.check_snapshot_changes.outcome == 'failure'
      with:
        title: 'fix: Update catalog'
        token: ${{ steps.generate-token.outputs.token }}
        signoff: true
